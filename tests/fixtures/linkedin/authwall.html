<!DOCTYPE html>
<html lang="en" class="authwall">
  <head>
    <meta name="session_redirect" content="/company/blocked/">
    <title>Sign Up | LinkedIn</title>
  </head>
  <body>
    <main>
      <h1>Join LinkedIn to see this page</h1>
      <p>Sign in to see who you already know at Blocked Inc.</p>
      <form action="/uas/login" method="post">
        <input type="email" name="session_key" />
        <input type="password" name="session_password" />
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
